<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <title>Parking Pizza</title>
</head>

<body>
    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="order.html">Order</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <h1 class="contact-heading">Get in touch with us</h1>
        <form action="https://api.web3forms.com/submit" method="POST" class="contact">
            <input type="hidden" name="access_key" value="2920ec12-5f33-4aa3-a524-47401c681fd7">

            <label>
                Name
                <input type="text" name="name" placeholder="Your name" required>
            </label>

            <label>
                Email
                <input type="email" name="email" placeholder="you@example.com" required>
            </label>

            <label>
                Message
                <textarea name="message" placeholder="Type your message here" required></textarea>
            </label>

            <div class="captcha-wrapper">
                <div class="h-captcha" data-captcha="true" data-theme="dark"></div>
            </div>

            <button type="submit">Submit Form</button>
        </form>
    </main>

    <script src="https://web3forms.com/client/script.js" async defer></script>
</body>
